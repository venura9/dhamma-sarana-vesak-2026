name: Generate Advertisement Videos (Edge TTS)

on:
  push:
    branches: [main]
    paths:
      - Advertisement/sinhala_script.txt
      - Advertisement/english_script.txt
      - Advertisement/poster.jpg
      - Advertisement/generate_videos.sh
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          lfs: true
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Install ffmpeg and edge-tts
        run: |
          brew install ffmpeg python
          pip3 install edge-tts --break-system-packages

      - name: Generate videos via Edge TTS
        working-directory: Advertisement
        run: bash generate_videos.sh

      - name: Commit and push generated videos
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Advertisement/vesak_sinhala.mp4 Advertisement/vesak_english.mp4 Advertisement/generate_videos.log
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "ci: regenerate advertisement videos via Edge TTS [skip ci]"
            git pull --rebase origin main
            git push https://${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="ads-edge-$(date +%Y%m%d-%H%M)"
          gh release create "$TAG" \
            Advertisement/vesak_sinhala.mp4 \
            Advertisement/vesak_english.mp4 \
            --title "Ad Videos (Edge TTS) $(date +%Y-%m-%d %H:%M)" \
            --notes "Advertisement videos generated via Edge TTS."

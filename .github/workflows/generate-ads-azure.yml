name: Generate Advertisement Videos (Azure TTS)

on:
  push:
    branches: [main]
    paths:
      - Advertisement/sinhala_script.txt
      - Advertisement/english_script.txt
      - Advertisement/poster.jpg
      - Advertisement/generate_videos_azure.sh
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          lfs: true
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Install ffmpeg
        run: brew install ffmpeg

      - name: Generate videos via Azure TTS
        working-directory: Advertisement
        env:
          AZURE_KEY: ${{ secrets.AZURE_SPEECH_KEY }}
          AZURE_REGION: ${{ secrets.AZURE_SPEECH_REGION || 'australiaeast' }}
        run: |
          sed "s/AZURE_KEY=\"\"/AZURE_KEY=\"${AZURE_KEY}\"/" generate_videos_azure.sh \
            | sed "s/AZURE_REGION=\"australiaeast\"/AZURE_REGION=\"${AZURE_REGION}\"/" \
            | bash
          mv vesak_sinhala.mp4 vesak_sinhala_azure.mp4
          mv vesak_english.mp4 vesak_english_azure.mp4

      - name: Commit and push generated videos
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Advertisement/vesak_sinhala_azure.mp4 Advertisement/vesak_english_azure.mp4 Advertisement/generate_videos.log
          git status
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "ci: regenerate advertisement videos via Azure TTS [skip ci]"
            git fetch origin main
            git rebase origin/main
            git push https://${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="ads-azure-$(date +%Y%m%d-%H%M)"
          gh release create "$TAG" \
            Advertisement/vesak_sinhala_azure.mp4 \
            Advertisement/vesak_english_azure.mp4 \
            --title "Ad Videos (Azure TTS) $(date +%Y-%m-%d %H:%M)" \
            --notes "Advertisement videos generated via Azure TTS."

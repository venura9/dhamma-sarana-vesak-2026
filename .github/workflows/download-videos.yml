name: Download New Videos

on:
  push:
    branches: [main]
    paths:
      - videos.txt
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download:
    runs-on: macos-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install yt-dlp and ffmpeg
        run: brew install yt-dlp ffmpeg

      - name: Write YouTube cookies
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: echo "$YOUTUBE_COOKIES" > cookies.txt

      - name: Download new videos
        run: |
          yt-dlp -f "bestvideo[ext=mp4][height<=1080]+bestaudio[ext=m4a]/bestvideo[height<=1080]+bestaudio/best" \
            --merge-output-format mp4 \
            -o "%(title)s.%(ext)s" \
            --download-archive download_archive.txt \
            --cookies cookies.txt \
            -a videos.txt 2>&1 | tee download.log
          rm -f cookies.txt

      - name: Check for new files
        id: check
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "new_files=false" >> "$GITHUB_OUTPUT"
          else
            echo "new_files=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push new videos
        if: steps.check.outputs.new_files == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "ci: add newly downloaded videos [skip ci]"
          git push
